<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO Global Telemedicine Platform - P001</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        /* Core Design Principles: Trust First, Radical Simplicity, Guided Experience */
        :root {
            --primary-color: #0056A6;
            --secondary-color: #FFFFFF;
            --text-color: #333333;
            --button-bg-color: #F0F4F8;
            --button-hover-color: #DDE6ED;
            --accent-red: #D8412C;
            --accent-yellow: #F7B829;
            --accent-green: #2E8540;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Noto Sans', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        .header img {
            height: 40px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.2em;
            font-weight: 500;
            color: var(--primary-color);
            margin: 0;
        }
        
        .screen {
            display: none;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
        }

        .action-button {
            display: block;
            width: 100%;
            padding: 25px 20px;
            margin: 15px 0;
            font-size: 1.3em;
            font-weight: 700;
            text-align: center;
            background-color: var(--button-bg-color);
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .action-button:hover {
            background-color: var(--button-hover-color);
        }
        
        .footer {
            padding: 10px;
            font-size: 0.8em;
            color: #999;
        }

        /* Screen 2: Image Capture Guide */
        #capture-guide-screen p { font-size: 1.1em; color: var(--text-color); margin-bottom: 20px; }
        .camera-overlay { width: 100%; height: 300px; border: 3px dashed var(--primary-color); border-radius: 20px; display: flex; justify-content: center; align-items: center; position: relative; background-color: #f0f0f0; }
        .overlay-text { color: var(--primary-color); font-weight: bold; }
        .quality-feedback { display: flex; justify-content: space-around; width: 100%; padding: 15px 0; }
        .feedback-item { display: flex; align-items: center; font-size: 0.9em; }
        .feedback-item span { margin-right: 8px; font-size: 1.5em; }
        .button-group { display: flex; justify-content: space-between; width: 100%; margin-top: 20px; }
        .button-group .action-button { width: 48%; }

        /* Screen 3: AI Result */
        .result-card {
            width: 100%;
            border-width: 4px;
            border-style: solid;
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .result-card .signal-icon { font-size: 4em; margin-bottom: 10px; }
        .result-card h3 { font-size: 2em; margin: 10px 0; }
        .result-card p { font-size: 1.1em; line-height: 1.6; }
        .result-card .prediction-details { font-size: 0.9em; color: #666; margin-top: 20px; }

        .signal-red { border-color: var(--accent-red); color: var(--accent-red); }
        .signal-yellow { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .signal-green { border-color: var(--accent-green); color: var(--accent-green); }

        .disclaimer { font-size: 0.9em; color: #666; font-style: italic; }

    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="https://www.who.int/images/default-source/common/who-logo-en.svg?sfvrsn=2290225_2" alt="WHO Logo">
            <h1>Global AI Health Platform</h1>
        </header>

        <!-- Screen 1: Home -->
        <main id="home-screen" class="screen active">
            <a href="#" class="action-button" onclick="showScreen('capture-guide-screen')">새로운 환자 기록 시작하기</a>
            <a href="#" class="action-button">기존 환자 기록 보기</a>
        </main>

        <!-- Screen 2: Image Capture Guide -->
        <main id="capture-guide-screen" class="screen">
            <p>환부를 화면 중앙의 가이드에 맞춰주세요.</p>
            <div class="quality-feedback">
                <div class="feedback-item"><span style="color: var(--accent-green);">☀️</span> 밝기 양호</div>
                <div class="feedback-item"><span style="color: var(--accent-red);">↔️</span> 약간 흔들림</div>
            </div>
            <div class="camera-overlay"><div class="overlay-text">피부 촬영 영역</div></div>
            <div class="button-group">
                 <a href="#" class="action-button" style="background-color: var(--button-bg-color); border-color: #888; color: #888;" onclick="showScreen('home-screen')">뒤로 가기</a>
                 <a href="#" class="action-button" onclick="showScreen('ai-result-screen')">사진 촬영</a>
            </div>
        </main>

        <!-- Screen 3: AI Result (Yellow Case) -->
        <main id="ai-result-screen" class="screen">
            <h2>AI 분석 결과 요약</h2>
            <div class="result-card signal-yellow">
                <div class="signal-icon">⚠️</div>
                <h3>주의 (Caution)</h3>
                <p>피부 질환의 가능성이 있습니다.<br>현지 보건 요원을 위한 다음 단계 프로토콜을 확인하세요.</p>
                <p class="prediction-details">[AI 예측 정보] 피부염: 67%, 벌레 물림: 21%</p>
            </div>
            <p class="disclaimer">*이것은 의료적 진단이 아닌, 참고 정보입니다.</p>
            <a href="#" class="action-button" onclick="showScreen('home-screen')">처음으로 돌아가기</a>
        </main>


        <footer class="footer">
            <p>Version 0.1.0 (MVP)</p>
        </footer>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
