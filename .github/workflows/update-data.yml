name: Update CSV Daily

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python 실행
        run: python generate.py
      - name: 커밋 & push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data.csv
          git commit -m "자동 데이터 업데이트"
          git push
