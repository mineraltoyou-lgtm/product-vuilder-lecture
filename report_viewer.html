<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정책 보고서 뷰어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #111; color: #eee; }
        .sidebar { background-color: #1a1a1a; }
        .main-content { background-color: #0a0a0a; }
        .report-button { transition: background-color 0.2s; }
        .report-button:hover, .report-button.active { background-color: #2a6fdb; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body class="flex h-screen">

    <div id="sidebar" class="sidebar w-1/4 h-full overflow-y-auto p-4 border-r border-gray-700">
        <h2 class="text-xl font-bold mb-4">보고서 목록</h2>
        <div id="report-list"></div>
    </div>

    <div id="main-content" class="main-content w-3/4 h-full overflow-y-auto p-8">
        <div id="report-body" class="prose prose-invert max-w-none"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const reportListEl = document.getElementById('report-list');
            const reportBodyEl = document.getElementById('report-body');

            // Extracts YYYY-MM-DD and creates a Date object.
            const extractDate = (path) => {
                const match = path.match(/(\d{4}-\d{2}-\d{2})/);
                return match ? new Date(match[0]) : null;
            };

            const loadReport = async (path) => {
                try {
                    const reportResponse = await fetch(path);
                    if (!reportResponse.ok) throw new Error(`Report fetch failed with status: ${reportResponse.status}`);
                    const reportMarkdown = await reportResponse.text();
                    reportBodyEl.innerHTML = marked.parse(reportMarkdown);
                } catch (error) {
                    console.error('Error loading report:', path, error);
                    reportBodyEl.innerHTML = `<p class="text-red-500">보고서 로딩 중 오류 발생: ${error.message}</p>`;
                }
            };

            try {
                const response = await fetch('./reports-list.json');
                if (!response.ok) throw new Error('Failed to fetch reports list.');
                
                const reportFiles = await response.json();

                if (reportFiles.length === 0) {
                    reportListEl.innerHTML = '<p>생성된 보고서가 없습니다.</p>';
                    return;
                }

                // Sort files by date in descending order (newest first).
                reportFiles.sort((a, b) => {
                    const dateA = extractDate(a);
                    const dateB = extractDate(b);
                    if (dateA && dateB) return dateB - dateA;
                    // Fallback for items without a date.
                    return b.localeCompare(a);
                });

                // Create sidebar buttons for each report.
                reportFiles.forEach(path => {
                    const button = document.createElement('button');
                    const filename = path.split('/').pop().replace('.md', ''); // More descriptive name
                    button.textContent = filename;
                    button.className = 'report-button block w-full text-left p-2 my-1 rounded';
                    button.dataset.path = path;
                    
                    button.addEventListener('click', () => {
                        loadReport(path);
                        // Update active state for buttons
                        document.querySelectorAll('.report-button').forEach(btn => btn.classList.remove('active'));
                        button.classList.add('active');
                    });
                    reportListEl.appendChild(button);
                });

                // Automatically load the newest report on page load.
                if (reportFiles.length > 0) {
                    await loadReport(reportFiles[0]);
                    const firstButton = reportListEl.querySelector('.report-button');
                    if (firstButton) {
                        firstButton.classList.add('active');
                    }
                }

            } catch (error) {
                console.error('Error initializing report viewer:', error);
                reportListEl.innerHTML = `<p class="text-red-500">뷰어 초기화 중 오류 발생: ${error.message}</p>`;
            }
        });
    </script>

</body>
</html>
