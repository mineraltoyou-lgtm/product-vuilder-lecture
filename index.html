
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>200 OSS Matrix Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; }
        .grid-card { background: #111; border: 1px solid #222; transition: 0.2s; }
        .grid-card:hover { border-color: #444; background: #161616; }
        #report-content { white-space: pre-wrap; word-wrap: break-word; background: #1a1a1a; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; }
    </style>
</head>
<body class="p-10">
    <h1 class="text-3xl font-bold mb-4 border-b border-zinc-800 pb-4">System 200: Global Matrix</h1>
    
    <button id="show-report-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-8">최신 보고서 보기</button>
    <pre id="report-content"></pre>

    <div id="matrix" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
    </div>

    <script>
        const showReportBtn = document.getElementById('show-report-btn');
        const reportContentEl = document.getElementById('report-content');

        showReportBtn.addEventListener('click', async () => {
            try {
                // 'reports-list.json' 파일을 가져와서 보고서 목록을 동적으로 로드합니다.
                const listResponse = await fetch('./reports-list.json');
                if (!listResponse.ok) {
                    throw new Error('보고서 목록을 불러오는 데 실패했습니다.');
                }
                const reportFiles = await listResponse.json();

                if (reportFiles.length === 0) {
                    reportContentEl.textContent = '표시할 보고서가 없습니다.';
                    reportContentEl.style.display = 'block';
                    return;
                }

                // 파일 목록을 날짜 기준으로 정렬하여 가장 최신 파일을 찾습니다.
                reportFiles.sort().reverse();
                const latestReportPath = reportFiles[0];

                const reportResponse = await fetch(latestReportPath);
                if (!reportResponse.ok) {
                    throw new Error('보고서를 불러오는 데 실패했습니다.');
                }
                const reportText = await reportResponse.text();
                
                reportContentEl.textContent = reportText;
                reportContentEl.style.display = reportContentEl.style.display === 'none' ? 'block' : 'none';

            } catch (error) {
                console.error('Error fetching report:', error);
                reportContentEl.textContent = '보고서를 불러오는 중 오류가 발생했습니다.';
                reportContentEl.style.display = 'block';
            }
        });

        // 기존 매트릭스 데이터 로딩 로직
        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                const html = data.map(p => `
                    <div class="grid-card p-5 rounded-lg">
                        <div class="text-xs text-zinc-600 mb-1">${p.id}</div>
                        <h2 class="text-lg font-bold">${p.name}</h2>
                        <p class="text-sm text-zinc-400 mt-2">${p.category}</p>
                        <a href="./platforms/${p.id}/index.html" class="inline-block mt-4 text-blue-500 text-sm hover:underline">Launch →</a>
                    </div>
                `).join('');
                document.getElementById('matrix').innerHTML = html;
            });
    </script>
</body>
</html>
