<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --container-bg: #ffffff;
            --btn-bg: #007bff;
            --btn-hover: #0056b3;
            --toggle-bg: #e0e0e0;
        }

        [data-theme='dark'] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --btn-bg: #3700b3;
            --btn-hover: #4b00d1;
            --toggle-bg: #333;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: var(--toggle-bg);
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        h1 {
            margin-bottom: 30px;
        }

        #result {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .yellow { background-color: #fbc02d; }
        .blue { background-color: #1976d2; }
        .red { background-color: #e53935; }
        .gray { background-color: #757575; }
        .green { background-color: #43a047; }

        .main-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .main-btn:hover {
            background-color: var(--btn-hover);
        }

        .main-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">다크 모드 보기</button>

    <h1>🍀 로또 번호 추첨기</h1>
    
    <div id="result"></div>

    <button class="main-btn" onclick="generateNumbers()">번호 추첨하기</button>

    <script>
        // 테마 설정 초기화
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateToggleButtonText(currentTheme);

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleButtonText(newTheme);
        }

        function updateToggleButtonText(theme) {
            const btn = document.getElementById('themeBtn');
            btn.innerText = theme === 'light' ? '다크 모드 보기' : '라이트 모드 보기';
        }

        function generateNumbers() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';

            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }

            numbers.sort((a, b) => a - b);

            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = 'ball ' + getColorClass(num);
                    ball.innerText = num;
                    resultDiv.appendChild(ball);
                }, index * 200);
            });
        }

        function getColorClass(num) {
            if (num <= 10) return 'yellow';
            if (num <= 20) return 'blue';
            if (num <= 30) return 'red';
            if (num <= 40) return 'gray';
            return 'green';
        }
    </script>
</body>
</html>
