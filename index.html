<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse 24/7 | 실시간 뉴스 리스트</title>
    <style>
        :root {
            --bg-black: #0a0a0a;
            --list-bg: #111111;
            --accent: #ff3e3e;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: #222222;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0; padding: 0;
        }

        header {
            padding: 20px 5%;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        .search-container { flex-grow: 1; max-width: 500px; margin: 0 20px; display: flex; gap: 10px; }
        .search-input {
            width: 100%; padding: 10px 15px; border-radius: 5px;
            background: #1a1a1a; border: 1px solid #333; color: white; outline: none;
        }
        .search-btn {
            padding: 8px 20px; border-radius: 5px; background: var(--accent);
            border: none; color: white; font-weight: bold; cursor: pointer;
        }

        .category-nav {
            background: #000; padding: 10px 5%; display: flex; gap: 15px;
            border-bottom: 1px solid var(--border); overflow-x: auto;
        }
        .cat-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 0.95rem; font-weight: bold; white-space: nowrap;
            padding-bottom: 5px; transition: 0.3s;
        }
        .cat-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        main { padding: 30px 5%; max-width: 1000px; margin: 0 auto; }

        .news-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
        
        .news-item {
            background: var(--list-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
            text-decoration: none;
        }
        .news-item:hover { background: #161616; }

        .news-info { flex-grow: 1; }
        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1.4;
            display: block;
        }
        .news-meta { font-size: 0.8rem; color: var(--text-dim); display: flex; gap: 15px; }
        .news-time { color: var(--accent); }

        .analysis-loader { display: none; text-align: center; padding: 100px 0; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .search-container { width: 100%; margin: 0; }
            .news-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GLOBAL PULSE 24/7</div>
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="검색어를 입력하세요...">
        <button class="search-btn" onclick="fetchNews()">수집</button>
    </div>
</header>

<nav class="category-nav">
    <button class="cat-btn active" onclick="changeCategory('주요 뉴스', this)">주요 뉴스</button>
    <button class="cat-btn" onclick="changeCategory('세계', this)">세계</button>
    <button class="cat-btn" onclick="changeCategory('경제', this)">경제</button>
    <button class="cat-btn" onclick="changeCategory('IT 기술', this)">IT/기술</button>
    <button class="cat-btn" onclick="changeCategory('정치', this)">정치</button>
    <button class="cat-btn" onclick="changeCategory('환경 이상기후', this)">기후</button>
    <button class="cat-btn" onclick="changeCategory('과학', this)">과학</button>
</nav>

<main>
    <div id="loader" class="analysis-loader">
        <div class="spinner"></div>
        <p>구글 실시간 뉴스 데이터 수집 중...</p>
    </div>

    <div id="contentSection">
        <h2 id="sectionTitle" style="font-size: 1.2rem; margin-bottom: 20px; color: var(--text-dim);">🌐 실시간 헤드라인 10</h2>
        <div class="news-list" id="newsList">
            <!-- 뉴스 항목이 여기에 들어갑니다 -->
        </div>
    </div>
</main>

<script>
    const PROXY_URL = "https://api.rss2json.com/v1/api.json?rss_url=";

    async function fetchNews(query = "") {
        const listContainer = document.getElementById('newsList');
        const loader = document.getElementById('loader');
        const content = document.getElementById('contentSection');
        const searchInput = document.getElementById('searchInput');

        const searchTerm = query || searchInput.value.trim() || "주요 뉴스";
        
        content.style.display = 'none';
        loader.style.display = 'block';

        const googleNewsUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(searchTerm)}&hl=ko&gl=KR&ceid=KR:ko`;
        
        try {
            const response = await fetch(PROXY_URL + encodeURIComponent(googleNewsUrl));
            const data = await response.json();

            if (data.status === 'ok') {
                renderList(data.items.slice(0, 10), searchTerm); // 정확히 10개만 추출
            } else {
                throw new Error("데이터 수집 실패");
            }
        } catch (error) {
            console.error(error);
            listContainer.innerHTML = '<div style="padding:40px; text-align:center;">뉴스를 불러오지 못했습니다. 다시 시도해주세요.</div>';
        } finally {
            loader.style.display = 'none';
            content.style.display = 'block';
        }
    }

    function renderList(items, term) {
        const listContainer = document.getElementById('newsList');
        const title = document.getElementById('sectionTitle');
        listContainer.innerHTML = '';
        title.innerText = `🔍 "${term}" 최신 뉴스 TOP 10`;

        items.forEach(item => {
            const pubDate = new Date(item.pubDate);
            const timeStr = `${pubDate.getMonth()+1}/${pubDate.getDate()} ${pubDate.getHours()}:${String(pubDate.getMinutes()).padStart(2, '0')}`;
            
            const itemElement = document.createElement('a');
            itemElement.href = item.link;
            itemElement.target = "_blank";
            itemElement.className = "news-item";
            itemElement.innerHTML = `
                <div class="news-info">
                    <span class="news-title">${item.title}</span>
                    <div class="news-meta">
                        <span class="news-time">${timeStr}</span>
                        <span>${item.author || '뉴스 소스'}</span>
                    </div>
                </div>
                <div style="color: #444; font-size: 1.2rem;">→</div>
            `;
            listContainer.appendChild(itemElement);
        });
    }

    function changeCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchNews(cat);
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchNews();
    });

    // 초기 로드
    window.onload = () => fetchNews("주요 뉴스");
</script>

</body>
</html>
