<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse 24/7 | 10대 뉴스 대시보드</title>
    <style>
        :root {
            --bg-black: #050505;
            --card-bg: #121212;
            --accent: #ff3e3e;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-black);
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            padding: 20px 5%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        /* 카테고리 네비게이션 */
        .category-bar {
            background: #000;
            padding: 15px 5%;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #222;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 8px 18px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid #333;
            color: #ccc;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .cat-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.4);
        }

        /* 메인 컨텐츠 */
        main { padding: 30px 5%; max-width: 1400px; margin: 0 auto; }

        .analysis-loader {
            display: none;
            text-align: center;
            padding: 50px;
            font-style: italic;
            color: var(--accent);
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .news-card:hover { border-color: #555; transform: translateY(-5px); }

        .news-img { height: 180px; background-size: cover; background-position: center; }

        .news-content { padding: 20px; flex-grow: 1; }
        .news-tag { color: var(--accent); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .news-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 12px; line-height: 1.4; }
        .news-desc { color: var(--text-gray); font-size: 0.9rem; line-height: 1.6; margin-bottom: 15px; }

        .news-footer { border-top: 1px solid #222; padding: 15px 20px; font-size: 0.8rem; color: #555; display: flex; justify-content: space-between; }

        /* 푸터 */
        footer { padding: 60px 5%; text-align: center; border-top: 1px solid #222; color: #444; }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        sports: Array(10).fill().map((_, i) => ({ title: `스포츠 하이라이트 ${i+1}`, desc: "전 세계 경기 결과와 이적 시장 소식.", tag: "스포츠", time: `${i+1}시간 전`, img: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=400" })),
        entertainment: Array(10).fill().map((_, i) => ({ title: `글로벌 엔터 ${i+1}`, desc: "할리우드 소식과 K-콘텐츠의 전 세계적 흥행.", tag: "문화", time: `${i+1}시간 전`, img: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400" })),
        science: Array(10).fill().map((_, i) => ({ title: `우주/과학 브리핑 ${i+1}`, desc: "심우주 탐사와 양자 컴퓨터 연구의 최신 진척.", tag: "과학", time: `${i+1}시간 전`, img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400" })),
    };

    function changeCategory(cat, btn) {
        // 버튼 활성화 처리
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('newsGrid');
        const loader = document.getElementById('loader');

        // 로딩 효과
        grid.style.display = 'none';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            grid.style.display = 'grid';
            renderNews(cat);
        }, 800);
    }

    function renderNews(cat) {
        const grid = document.getElementById('newsGrid');
        grid.innerHTML = '';

        const data = newsData[cat] || [];
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
                <div class="news-img" style="background-image: url('${item.img}')"></div>
                <div class="news-content">
                    <div class="news-tag">${item.tag}</div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-desc">${item.desc}</div>
                </div>
                <div class="news-footer">
                    <span>${item.time}</span>
                    <span style="color: var(--accent)">READ MORE →</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 초기 화면 로드
    window.onload = () => renderNews('urgent');
</script>

</body>
</html>
