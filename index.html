<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>녹조 위험 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>녹조 위험 대시보드</h1>

    <label for="location">위치 선택:</label>
    <select id="location">
        <option value="낙동강">낙동강</option>
        <option value="한강">한강</option>
        <option value="금강">금강</option>
    </select>

    <button onclick="calculateRisk()">위험 계산</button>

    <div>
        <p>Risk Score: <span id="riskScore">-</span></p>
        <p>Status: <span id="status">-</span></p>
    </div>

    <canvas id="riskChart" width="800" height="400"></canvas>

    <script src="app.js"></script>
</body>
</html>
