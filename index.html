<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #000000; /* 배경을 순수 검은색으로 설정 */
            --text-color: #ffffff; /* 텍스트를 흰색으로 설정 */
            --container-bg: #1e1e1e;
            --btn-bg: #007bff;
            --btn-hover: #0056b3;
            --toggle-bg: #333;
            --ball-size: 60px;
            --ball-font: 24px;
        }

        /* 다크모드/라이트모드 구분을 없애거나 검은색 테마로 통일 */
        [data-theme='dark'] {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            background-color: var(--toggle-bg);
            border: 1px solid #444;
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-align: center;
            word-break: keep-all;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            min-height: 80px;
            width: 100%;
            max-width: 600px;
        }

        .ball {
            width: var(--ball-size);
            height: var(--ball-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--ball-font);
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            animation: bounce 0.5s ease-out forwards;
            flex-shrink: 0;
        }

        @keyframes bounce {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .yellow { background: radial-gradient(circle at 30% 30%, #fdd835, #fbc02d); }
        .blue { background: radial-gradient(circle at 30% 30%, #42a5f5, #1976d2); }
        .red { background: radial-gradient(circle at 30% 30%, #ef5350, #e53935); }
        .gray { background: radial-gradient(circle at 30% 30%, #9e9e9e, #757575); }
        .green { background: radial-gradient(circle at 30% 30%, #66bb6a, #43a047); }

        .main-btn {
            padding: 16px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            color: white;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .main-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        /* 반응형 설정 */
        @media (max-width: 480px) {
            :root {
                --ball-size: 50px;
                --ball-font: 20px;
            }
            h1 { font-size: 1.8rem; margin-top: 60px; }
            .main-btn { width: 90%; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">배경 전환</button>

    <h1>🍀 로또 번호 추첨기</h1>
    
    <div id="result"></div>

    <button class="main-btn" onclick="generateNumbers()">번호 추첨하기</button>

    <script>
        // 초기 설정 (기본 블랙)
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function generateNumbers() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) numbers.push(num);
            }
            numbers.sort((a, b) => a - b);
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = 'ball ' + getColorClass(num);
                    ball.innerText = num;
                    resultDiv.appendChild(ball);
                }, index * 150);
            });
        }

        function getColorClass(num) {
            if (num <= 10) return 'yellow';
            if (num <= 20) return 'blue';
            if (num <= 30) return 'red';
            if (num <= 40) return 'gray';
            return 'green';
        }
    </script>
</body>
</html>
