<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하천 녹조 위험 모니터링</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, select, button { padding: 5px 10px; margin: 5px; }
        #riskScore, #status { font-weight: bold; }
    </style>
</head>
<body>
    <h1>하천 녹조 위험 모니터링</h1>
    <label for="location">위치 선택:</label>
    <select id="location">
        <option value="낙동강">낙동강</option>
        <option value="한강">한강</option>
        <option value="금강">금강</option>
    </select>
    <button onclick="calculateRisk()">위험 점수 계산</button>

    <p>Risk Score: <span id="riskScore">-</span></p>
    <p>Status: <span id="status">-</span></p>

    <canvas id="riskChart" width="600" height="300"></canvas>

    <script src="app.js"></script>
</body>
</html>
