
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>200 OSS Matrix Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; }
        .grid-card { background: #111; border: 1px solid #222; transition: 0.2s; }
        .grid-card:hover { border-color: #444; background: #161616; }
        /* 기존 보고서 표시 영역은 더 이상 필요 없으므로 삭제 또는 주석 처리할 수 있습니다. */
        /* #report-content { white-space: pre-wrap; ... } */
    </style>
</head>
<body class="p-10">
    <h1 class="text-3xl font-bold mb-4 border-b border-zinc-800 pb-4">System 200: Global Matrix</h1>
    
    <button id="report-viewer-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mb-8">보고서 관리 뷰어</button>

    <div id="matrix" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
    </div>

    <script>
        // "보고서 관리 뷰어" 버튼을 클릭하면 새 창에서 report_viewer.html을 엽니다.
        document.getElementById('report-viewer-btn').addEventListener('click', () => {
            window.open('report_viewer.html', '_blank');
        });

        // 기존 매트릭스 데이터 로딩 로직은 그대로 유지합니다.
        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                const html = data.map(p => `
                    <div class="grid-card p-5 rounded-lg">
                        <div class="text-xs text-zinc-600 mb-1">${p.id}</div>
                        <h2 class="text-lg font-bold">${p.name}</h2>
                        <p class="text-sm text-zinc-400 mt-2">${p.category}</p>
                        <a href="./platforms/${p.id}/index.html" class="inline-block mt-4 text-blue-500 text-sm hover:underline">Launch →</a>
                    </div>
                `).join('');
                document.getElementById('matrix').innerHTML = html;
            });
    </script>
</body>
</html>
