<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #00d2ff;
            --ball-size: 65px;
            --ball-font: 26px;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* 배경 애니메이션을 위해 스크롤 방지 */
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 3D 배경 캔버스 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #bgCanvas.active {
            opacity: 0.6;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .theme-toggle:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        h1 {
            margin-bottom: 40px;
            font-size: 3rem;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            min-height: 100px;
        }

        .ball {
            width: var(--ball-size);
            height: var(--ball-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--ball-font);
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset -5px -5px 15px rgba(0,0,0,0.3);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }

        .ball::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 30%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .yellow { background: radial-gradient(circle at 30% 30%, #ffd600, #ffab00); }
        .blue { background: radial-gradient(circle at 30% 30%, #2979ff, #2962ff); }
        .red { background: radial-gradient(circle at 30% 30%, #ff5252, #d50000); }
        .gray { background: radial-gradient(circle at 30% 30%, #9e9e9e, #616161); }
        .green { background: radial-gradient(circle at 30% 30%, #00e676, #00c853); }

        .main-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #007bff, #00d2ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .main-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.5);
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding: 20px; width: 90%; }
            --ball-size: 50px;
            --ball-font: 20px;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <button class="theme-toggle" onclick="toggle3DEffect()" id="toggleBtn">3D 배경 켜기</button>

    <div class="container">
        <h1>✨ LOTTO 6/45</h1>
        <div id="result"></div>
        <button class="main-btn" onclick="generateNumbers()">번호 추첨하기</button>
    </div>

    <script>
        // 3D 배경 로직
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationActive = false;
        let particles = [];

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * 1000; // 깊이감
                this.num = Math.floor(Math.random() * 45) + 1;
                this.speed = Math.random() * 2 + 1;
                this.opacity = 0;
            }
            update() {
                this.z -= this.speed;
                if (this.z <= 0) this.reset();
                this.opacity = Math.min(1, (1000 - this.z) / 500);
            }
            draw() {
                const scale = 400 / (400 + this.z);
                const x2d = (this.x - canvas.width / 2) * scale + canvas.width / 2;
                const y2d = (this.y - canvas.height / 2) * scale + canvas.height / 2;
                const size = 60 * scale;

                ctx.save();
                ctx.translate(x2d, y2d);
                ctx.scale(scale, scale);
                ctx.globalAlpha = this.opacity;
                
                // 원형 숫자 배경
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 210, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 숫자 텍스트
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.num, 0, 0);
                
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (!animationActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();

        function toggle3DEffect() {
            const btn = document.getElementById('toggleBtn');
            animationActive = !animationActive;
            
            if (animationActive) {
                canvas.classList.add('active');
                btn.innerText = '3D 배경 끄기';
                animate();
            } else {
                canvas.classList.remove('active');
                btn.innerText = '3D 배경 켜기';
            }
        }

        // 로또 번호 생성 로직
        function generateNumbers() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) numbers.push(num);
            }
            numbers.sort((a, b) => a - b);
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = 'ball ' + getColorClass(num);
                    ball.innerText = num;
                    resultDiv.appendChild(ball);
                }, index * 150);
            });
        }

        function getColorClass(num) {
            if (num <= 10) return 'yellow';
            if (num <= 20) return 'blue';
            if (num <= 30) return 'red';
            if (num <= 40) return 'gray';
            return 'green';
        }
    </script>
</body>
</html>
